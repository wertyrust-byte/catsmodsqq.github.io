  async function loadUsers() {
    const snapshot = await db.ref('users').once('value');
    users = snapshot.val() || {};
  }

  async function loadBannedIPs() {
    const snapshot = await db.ref('banned_ips').once('value');
    bannedIPs = snapshot.val() || {};
  }

  async function loadMods() {
    const snapshot = await db.ref('mods').once('value');
    const modsData = snapshot.val() || {};
    if (Object.keys(modsData).length === 0) {
      for (const mod of defaultMods) {
        await db.ref(`mods/${mod.id}`).set(mod);
      }
      allMods = [...defaultMods];
    } else {
      allMods = Object.values(modsData).sort((a, b) => {
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return b.created - a.created;
      });
    }
    renderMods();
  }

  async function loadUserDownloads() {
    if (!currentUser) return;
    const snapshot = await db.ref(`downloads/${currentUser}`).once('value');
    userDownloads = snapshot.val() || {};
  }

  async function saveUserDownload(modId) {
    if (!currentUser) return;
    await db.ref(`downloads/${currentUser}/${modId}`).set(true);
    userDownloads[modId] = true;
  }

  async function hasUserDownloaded(modId) {
    if (!currentUser) return false;
    return userDownloads[modId] === true;
  }

  async function incrementDownloads(modId) {
    const modRef = db.ref(`mods/${modId}`);
    const snapshot = await modRef.once('value');
    const mod = snapshot.val();
    if (mod) {
      await modRef.update({ downloads: (mod.downloads || 0) + 1 });
    }
  }

  async function togglePinMod(modId) {
    const modRef = db.ref(`mods/${modId}`);
    const snapshot = await modRef.once('value');
    const mod = snapshot.val();
    if (mod) {
      const canPin = isAdmin() || isModerator() || mod.author === currentUser;
      if (canPin) {
        await modRef.update({ pinned: !mod.pinned });
        await loadMods();
      }
    }
  }

  function isModerator() {

  async function checkPaymentStatus() {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order');
    const paymentStatus = urlParams.get('payment');
    
    if (paymentStatus === 'success' && orderId) {
      const payment = await db.ref(`payments/${orderId}`).once('value');
      const data = payment.val();
      if (data && data.user === currentUser && data.status === 'pending') {
        await db.ref(`users/${currentUser}`).update({ hasPaid: true });
        await db.ref(`payments/${orderId}`).update({ status: 'completed' });
        alert('✅ Оплата прошла успешно! Теперь вы можете создать свой мод!');
        window.history.replaceState({}, document.title, window.location.pathname);
        showMyModScreen();
      }
    }
  }

  // ========== БАН ПО IP ==========
  async function banByIP(username) {
    if (!isAdmin()) return false;
    const userData = users[username];
    if (!userData || !userData.ip) return false;
    await db.ref(`banned_ips/${userData.ip}`).set({
      bannedBy: currentUser,
      bannedAt: Date.now(),
      reason: 'Заблокирован администратором'
    });
    await db.ref(`users/${username}`).update({ isBanned: true });
    return true;
  }

  // ========== ЧАТ ПОДДЕРЖКИ ==========
  async function sendSupportMessage(text, imageData = null) {
    if (!currentUser) return;
    const message = {
      sender: currentUser,
      text: text || '',
      image: imageData,
      timestamp: Date.now(),
      read: false,
      pinned: false
    };
    await db.ref(`support_chats/${currentUser}/messages`).push(message);
    await db.ref(`support_notifications/${currentUser}`).set({
      username: currentUser,
      lastMessage: text || '📷 Изображение',
      timestamp: Date.now(),
      unread: true
    });

  async function sendAdminMessage(user, text, imageData = null) {
    const message = {
      sender: ADMIN_USERNAME,
      text: text || '',
      image: imageData,
      timestamp: Date.now(),
      read: true,
      pinned: false
    };
    await db.ref(`support_chats/${user}/messages`).push(message);
    await db.ref(`support_notifications/${user}`).update({ unread: false });
  }

  async function togglePinMessage(chatUser, messageId) {
    if (!isAdmin() && !isModerator()) return;
    const msgRef = db.ref(`support_chats/${chatUser}/messages/${messageId}`);
    const snapshot = await msgRef.once('value');
    const msg = snapshot.val();
    if (msg) {
      await msgRef.update({ pinned: !msg.pinned });
    }
  }

  async function markAsRead(user) {
    await db.ref(`support_notifications/${user}`).update({ unread: false });
  }

  async function getChatUsers() {
    const snapshot = await db.ref('support_notifications').once('value');
    const notifications = snapshot.val() || {};
    const usersWithChat = [];
    for (const [username, data] of Object.entries(notifications)) {
      usersWithChat.push({
        username: username,
        lastMessage: data.lastMessage,
        timestamp: data.timestamp,
        unread: data.unread
      });
    }
    return usersWithChat.sort((a, b) => b.timestamp - a.timestamp);
  }

  async function loadChatMessages(user) {
    if (chatMessagesListener) chatMessagesListener();
    const messagesRef = db.ref(`support_chats/${user}/messages`);
    chatMessagesListener = messagesRef.on('value', (snapshot) => {
      const messages = [];
      snapshot.forEach(child => {
        messages.push({ id: child.key, ...child.val() });
      });
      messages.sort((a, b) => a.timestamp - b.timestamp);
      renderChatMessages(messages, user);
    });
    await markAsRead(user);
    updateChatList();
  }

  function renderChatMessages(messages, user) {
    const container = document.getElementById('chatMessages');
    if (!container) return;
    
    const pinnedMessages = messages.filter(m => m.pinned);
    const regularMessages = messages.filter(m => !m.pinned);
    
    let html = '';
    if (pinnedMessages.length > 0) {
      html += '<div class="pinned-message"><strong>📌 Закреплённые сообщения:</strong><br>';
      pinnedMessages.forEach(msg => {
        html += `
          <div style="margin-top:5px; padding:5px; background:#333; border-radius:10px;">
            <div class="message-user">${msg.sender === ADMIN_USERNAME ? '👑 Администратор' : msg.sender}</div>
            <div class="message-text">${msg.text ? msg.text.replace(/\n/g, '<br>') : ''}${msg.image ? `<img src="${msg.image}" class="message-image" style="max-width:100px;">` : ''}</div>
            ${(isAdmin() || isModerator()) ? `<button class="pin-btn" onclick="togglePinMessage('${user}', '${msg.id}')">📌 Открепить</button>` : ''}
          </div>
        `;
      });
      html += '</div>';
    }
    
    if (regularMessages.length === 0 && pinnedMessages.length === 0) {
      html += '<div class="empty-chat">💬 Напишите свой вопрос в поддержку</div>';
    } else {
      html += regularMessages.map(msg => `
        <div class="message ${msg.sender === ADMIN_USERNAME ? 'message-admin' : ''}">
          <div class="message-user">
            ${msg.sender === ADMIN_USERNAME ? '👑 Администратор' : msg.sender}
            ${(isAdmin() || isModerator()) && msg.sender !== ADMIN_USERNAME ? `<button class="pin-btn" onclick="togglePinMessage('${user}', '${msg.id}')">📌 Закрепить</button>` : ''}
          </div>
          <div class="message-text">
            ${msg.text ? msg.text.replace(/\n/g, '<br>') : ''}
            ${msg.image ? `<img src="${msg.image}" class="message-image" onclick="window.open('${msg.image}')">` : ''}
          </div>
          <div style="font-size:0.6rem; color:#666; margin-top:2px;">${new Date(msg.timestamp).toLocaleString()}</div>
        </div>
      `).join('');
    }
    
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }

    const container = document.getElementById('chatListItems');
    if (!container) return;
    const usersList = await getChatUsers();
    if (usersList.length === 0) {

          <div class="chat-item-preview">${user.lastMessage.substring(0, 30)}${user.lastMessage.length > 30 ? '...' : ''}</div>
        </div>
        ${user.unread ? '<div class="unread-dot"></div>' : ''}
      </div>
    `).join('');
  }

  // ========== ОСНОВНЫЕ ФУНКЦИИ ==========
  async function register(username, password, telegram, ip) {
    await loadUsers();
    if (username.length < 4) return { success: false, error: 'Никнейм должен быть минимум 4 символа!' };
    if (password.length < 6) return { success: false, error: 'Пароль должен быть минимум 6 символов!' };
    if (!telegram || !telegram.startsWith('@')) return { success: false, error: 'Введите Telegram username, начиная с @' };
    if (users[username]) return { success: false, error: 'Никнейм уже занят!' };
    if (bannedIPs[ip]) return { success: false, error: '⛔ Ваш IP адрес заблокирован!' };
    const userData = {
      password: password,
      role: 'user',
      hasPaid: false,
      hasCreatedMod: false,
      userModId: null,
      registered: Date.now(),
      isBanned: false,
      telegram: telegram,
      ip: ip
    };
    await db.ref(`users/${username}`).set(userData);
    users[username] = userData;
    return { success: true };
  }
  
  async function login(username, password, ip) {
    await loadUsers();
    if (!users[username]) return { success: false, error: 'Пользователь не найден!' };
    if (users[username].isBanned) return { success: false, error: '⛔ Ваш аккаунт заблокирован!' };
    if (bannedIPs[ip]) return { success: false, error: '⛔ Ваш IP адрес заблокирован!' };
    if (users[username].password !== password) return { success: false, error: 'Неверный пароль!' };
    currentUser = username;
    localStorage.setItem('modhub_current_user', username);
    await loadUserDownloads();
    return { success: true };
  }
  
  function logout() {
    currentUser = null;
    localStorage.removeItem('modhub_current_user');
    showAuthScreen();
  }
  
  async function downloadMod(modId) {
    if (!currentUser) { alert('Войдите в аккаунт, чтобы скачивать моды!'); return; }
    if (await hasUserDownloaded(modId)) { alert('⚠️ Вы уже скачивали этот мод ранее!'); return; }
    await incrementDownloads(modId);
    await saveUserDownload(modId);
    await loadMods();
    renderMods();
    const mod = allMods.find(m => m.id === modId);
    if (mod && mod.link) window.open(mod.link, '_blank');
    alert('✅ Скачивание началось!');
  }
  
  function searchMods() {
    currentSearchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    renderMods();
  }
  
  function clearSearch() {
    document.getElementById('searchInput').value = '';
    currentSearchTerm = '';
    renderMods();
  }
  
  function renderMods() {
    const container = document.getElementById('modsGrid');
    let filteredMods = allMods;
    if (currentSearchTerm) {
      filteredMods = allMods.filter(mod => 
        mod.name.toLowerCase().includes(currentSearchTerm) ||
        mod.description.toLowerCase().includes(currentSearchTerm) ||
        mod.tags.some(tag => tag.toLowerCase().includes(currentSearchTerm))
      );
    }
    if (filteredMods.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:50px;">🔍 Модов по вашему запросу не найдено</div>';
      return;
    }
    container.innerHTML = filteredMods.map(mod => {
      const roleInfo = getUserRoleDisplay(mod.author);
      const canPin = isAdmin() || isModerator() || mod.author === currentUser;
      return `
      <div class="mod-card">
        <img class="mod-image" src="${mod.image}" alt="${mod.name}">
        <div class="mod-content">
          <div class="mod-title">
            ${mod.name}
            <span class="mod-version">${mod.version}</span>
          </div>
          <div class="mod-description">${mod.description}</div>
          <div class="mod-tags">
            ${mod.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            <span class="tag">📦 ${mod.size}</span>
            <span class="tag author-tag ${roleInfo.class}" onclick="viewProfile('${mod.author}')">${roleInfo.text} ${mod.author}</span>
            <span class="tag">📥 ${mod.downloads || 0}</span>
            ${mod.pinned ? '<span class="tag pin-tag">📌 ЗАКРЕПЛЁН</span>' : ''}
          </div>
          <button class="download-btn" onclick="downloadMod('${mod.id}')">⬇️ СКАЧАТЬ МОД</button>
          ${canPin ? `<button class="download-btn" style="background:#ffaa44; color:#000; margin-top:10px;" onclick="togglePinMod('${mod.id}')">${mod.pinned ? '📌 ОТКРЕПИТЬ' : '📌 ЗАКРЕПИТЬ'}</button>` : ''}
          ${(canDeleteAnyMod() || mod.author === currentUser) ? `<button class="download-btn" style="background:#333; margin-top:10px;" onclick="adminDeleteMod('${mod.id}')">🗑️ УДАЛИТЬ</button>` : ''}
        </div>
      </div>
    `}).join('');
  }

    if (confirm(`Сделать ${username} модератором?`)) {
      await db.ref(`users/${username}`).update({ role: 'moderator' });
      await loadUsers();
      alert(`✅ ${username} теперь модератор!`);
      await viewProfile(username);

  window.changeUsername = async function() {
    const newUsername = document.getElementById('newUsername').value.trim();
    if (newUsername === currentUser) return;
    if (newUsername.length < 4) { alert('Никнейм должен быть минимум 4 символа!'); return; }
    if (users[newUsername]) { alert('Этот никнейм уже занят!'); return; }
    const userData = users[currentUser];
    await db.ref(`users/${currentUser}`).remove();
    await db.ref(`users/${newUsername}`).set(userData);
    for (const mod of allMods) {
      if (mod.author === currentUser) await db.ref(`mods/${mod.id}`).update({ author: newUsername });
    }
    await loadUsers();
    await loadMods();
    currentUser = newUsername;
    localStorage.setItem('modhub_current_user', newUsername);
    alert('✅ Никнейм успешно изменён!');
    viewProfile(currentUser);
    toggleEditForm('username');
  };
  
  window.changeTelegram = async function() {
    const newTelegram = document.getElementById('newTelegram').value.trim();
    if (!newTelegram.startsWith('@')) { alert('Telegram username должен начинаться с @'); return; }
    await db.ref(`users/${currentUser}`).update({ telegram: newTelegram });
    await loadUsers();
    alert('✅ Telegram username успешно изменён!');
    viewProfile(currentUser);
    toggleEditForm('telegram');
  };

    if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
  };
  
  async function toggleBanUser(username) {
    if (!isAdmin()) return;
    const newBanStatus = !users[username].isBanned;
    await db.ref(`users/${username}`).update({ isBanned: newBanStatus });
    await loadUsers();
    await viewProfile(username);
    if (currentUser === username) logout();
  }

            <span class="tag">${data.role === 'admin' ? '👑 Админ' : (data.role === 'moderator' ? '🔧 Модератор' : '👤 Пользователь')}</span>
            ${data.hasPaid ? '<span class="tag" style="background:#4caf50;">💰 Оплатил</span>' : ''}
            ${data.hasCreatedMod ? '<span class="tag" style="background:#2196f3;">📦 Создал мод</span>' : ''}
            ${data.isBanned ? '<span class="tag" style="background:#e31b23;">⛔ Заблокирован</span>' : ''}
          </div>
          <div>
            <button style="background:#4caf50; padding:5px 10px;" onclick="adminViewProfile('${name}')">👤 Профиль</button>
            ${isAdmin() ? `<button style="background:#ffaa44; padding:5px 10px;" onclick="toggleBanUser('${name}')">${data.isBanned ? '🔓 Разблок' : '🔒 Блок'}</button>` : ''}
            ${isAdmin() && !data.hasPaid ? `<button style="background:#ffaa44; padding:5px 10px;" onclick="adminForcePay('${name}')">💳 Оплата</button>` : ''}
            ${isAdmin() && data.role !== 'admin' ? `<button style="background:#e31b23; padding:5px 10px;" onclick="adminDeleteUser('${name}')">🗑️ Удалить</button>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    container.innerHTML = `
      <div class="add-mod-form"><h3>👑 АДМИН-ПАНЕЛЬ</h3>
        <h4>➕ Добавить публичный мод</h4>
        <input type="text" id="adminModName" placeholder="Название"><input type="text" id="adminModVersion" placeholder="Версия"><textarea id="adminModDesc" placeholder="Описание" rows="2"></textarea>
        <input type="text" id="adminModTags" placeholder="Теги"><input type="text" id="adminModSize" placeholder="Размер"><input type="text" id="adminModImage" placeholder="Картинка"><input type="text" id="adminModLink" placeholder="Ссылка">
        <button class="btn" onclick="adminAddMod()">➕ ДОБАВИТЬ МОД</button>
        <h4 style="margin-top:25px;">👥 ПОЛЬЗОВАТЕЛИ</h4>${usersList}
        <h4>📦 ВСЕ МОДЫ</h4><div id="adminModsList"></div>
      </div>`;
    const modsList = document.getElementById('adminModsList');
    modsList.innerHTML = allMods.map(mod => `<div style="background:#0a0a0a; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between;"><span>${mod.name} (${mod.version}) — 👤 ${mod.author} | 📥 ${mod.downloads || 0} ${mod.pinned ? '📌' : ''}</span><button style="background:#e31b23; padding:5px 10px;" onclick="adminDeleteMod('${mod.id}')">🗑️</button></div>`).join('');
  }
  
  async function adminAddMod() {
    const name = document.getElementById('adminModName').value.trim();
    const version = document.getElementById('adminModVersion').value.trim();
    const description = document.getElementById('adminModDesc').value.trim();
    const tagsRaw = document.getElementById('adminModTags').value.trim();
    const size = document.getElementById('adminModSize').value.trim();
    const image = document.getElementById('adminModImage').value.trim();
    const link = document.getElementById('adminModLink').value.trim();
    if (!name || !version || !description || !size || !link) { alert('Заполните все поля!'); return; }
    const modId = 'mod_' + Date.now();
    await db.ref(`mods/${modId}`).set({ id: modId, name, version, description, tags: tagsRaw ? tagsRaw.split(',').map(t=>t.trim()) : ['Мод'], size, image: image || 'https://via.placeholder.com/600x400/1a1a1a/e31b23?text='+encodeURIComponent(name), link, author: currentUser, downloads: 0, created: Date.now(), pinned: false });
    await loadMods();
    showAdminPanel();
    alert('✅ Мод добавлен!');
  }
  
  async function adminDeleteMod(modId) {
    if (confirm('Удалить?')) { await db.ref(`mods/${modId}`).remove(); await loadMods(); if (isAdmin()) showAdminPanel(); renderMods(); }
  }
  
  async function adminDeleteUser(username) {
    if (confirm(`Удалить пользователя ${username}?`)) { await db.ref(`users/${username}`).remove(); await loadUsers(); showAdminPanel(); }
  }
  
  async function adminForcePay(username) {
    await db.ref(`users/${username}`).update({ hasPaid: true }); await loadUsers(); showAdminPanel(); alert(`✅ Пользователь ${username} получил оплату!`);
  }
  
  async function adminViewProfile(username) { await loadMods(); viewProfile(username); }
  
  function showCreateModForm() {
    document.getElementById('myModContent').innerHTML = `
      <div class="add-mod-form"><h3>📝 СОЗДАТЬ СВОЙ МОД (25₽ оплачено)</h3>
        <input type="text" id="modName" placeholder="Название"><input type="text" id="modVersion" placeholder="Версия"><textarea id="modDescription" placeholder="Описание" rows="3"></textarea>
        <input type="text" id="modTags" placeholder="Теги"><input type="text" id="modSize" placeholder="Размер"><input type="text" id="modImage" placeholder="Картинка"><input type="text" id="modLink" placeholder="Ссылка">
        <button class="btn btn-success" onclick="saveUserMod()">💾 СОХРАНИТЬ МОД</button>
        <button class="btn" onclick="cancelCreation()" style="background:#333;">❌ ОТМЕНА</button>
      </div>`;
  }
  
  async function saveUserMod() {
    if (users[currentUser].isBanned) { alert('⛔ Ваш аккаунт заблокирован!'); return; }
    const name = document.getElementById('modName').value.trim();
    const version = document.getElementById('modVersion').value.trim();
    const description = document.getElementById('modDescription').value.trim();
    const tagsRaw = document.getElementById('modTags').value.trim();
    const size = document.getElementById('modSize').value.trim();
    const image = document.getElementById('modImage').value.trim();
    const link = document.getElementById('modLink').value.trim();
    if (!name || !version || !description || !size || !link) { alert('Заполните все поля!'); return; }
    const modId = 'user_mod_' + currentUser + '_' + Date.now();
    await db.ref(`mods/${modId}`).set({ id: modId, name, version, description, tags: tagsRaw ? tagsRaw.split(',').map(t=>t.trim()) : ['Мод'], size, image: image || 'https://via.placeholder.com/600x400/1a1a1a/e31b23?text='+encodeURIComponent(name), link, author: currentUser, downloads: 0, created: Date.now(), pinned: false });
    await db.ref(`users/${currentUser}`).update({ hasCreatedMod: true, userModId: modId });
    await loadMods(); await loadUsers(); showMyModScreen(); alert('✅ Мод создан!');
  }
  
  function cancelCreation() { if (confirm('Отменить?')) showMyModScreen(); }
  async function editMod() {
    if (confirm('Редактирование удалит текущий мод. Продолжить?')) {
      const userData = users[currentUser];
      if (userData.userModId) await db.ref(`mods/${userData.userModId}`).remove();
      await db.ref(`users/${currentUser}`).update({ hasCreatedMod: false, userModId: null });
      await loadMods(); await loadUsers(); showCreateModForm();
    }
  }
  
  async function showMyModScreen() {
    await loadUsers();
    const userData = users[currentUser];
    if (!userData) return;
    if (userData.isBanned) { document.getElementById('myModContent').innerHTML = '<div style="background:#1a1a1a; padding:30px; text-align:center;"><h3>⛔ ДОСТУП ЗАБЛОКИРОВАН</h3></div>'; return; }
    if (!userData.hasPaid && !isAdmin()) {
      document.getElementById('myModContent').innerHTML = `<div style="background:#1a1a1a; padding:30px; text-align:center;"><h3>💰 СОЗДАЙ СВОЙ МОД ЗА 25₽</h3><button class="btn btn-success" onclick="createPayment()">💳 ОПЛАТИТЬ 25₽</button></div>`;
      return;
    }
    if (userData.hasCreatedMod && userData.userModId) {
      const userMod = allMods.find(m => m.id === userData.userModId);
      if (userMod) {
        document.getElementById('myModContent').innerHTML = `
          <div class="mods-grid"><div class="mod-card"><img class="mod-image" src="${userMod.image}"><div class="mod-content">
            <div class="mod-title">${userMod.name}<span class="mod-version">${userMod.version}</span></div>
            <div class="mod-description">${userMod.description}</div>
            <div class="mod-tags">${userMod.tags.map(t=>`<span class="tag">${t}</span>`).join('')}<span class="tag">📦 ${userMod.size}</span><span class="tag author-tag">👤 ${userMod.author}</span><span class="tag">📥 ${userMod.downloads||0}</span></div>
            <button class="download-btn" onclick="downloadMod('${userMod.id}')">⬇️ СКАЧАТЬ МОД</button>
            <button class="download-btn" onclick="editMod()" style="background:#4caf50;">✏️ РЕДАКТИРОВАТЬ</button>
          </div></div></div>`;
      } else showCreateModForm();
    } else showCreateModForm();
  }
  
  let isLoginMode = true;
  function showAuthScreen() {
    document.getElementById('profileContent').innerHTML = `
      <div class="auth-form"><h3>${isLoginMode ? '🔐 ВХОД' : '📝 РЕГИСТРАЦИЯ'}</h3><div id="authError" style="color:#e31b23;"></div>
      <input type="text" id="authUsername" placeholder="Никнейм (мин. 4)"><input type="password" id="authPassword" placeholder="Пароль (мин. 6)">
      ${!isLoginMode ? '<input type="text" id="authTelegram" placeholder="Telegram (@username)">' : ''}
      <button class="btn" onclick="handleAuth()">${isLoginMode ? 'ВОЙТИ' : 'ЗАРЕГИСТРИРОВАТЬСЯ'}</button>
      <div style="margin-top:15px; cursor:pointer" onclick="toggleAuthMode()">${isLoginMode ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти'}</div></div>`;
    document.getElementById('mods').classList.add('active'); document.getElementById('profile').classList.remove('active'); document.getElementById('myMod').classList.remove('active'); document.getElementById('support').classList.remove('active'); document.getElementById('admin').classList.remove('active');
  }
  
  function toggleAuthMode() { isLoginMode = !isLoginMode; showAuthScreen(); }
  
  async function handleAuth() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    const telegram = !isLoginMode ? document.getElementById('authTelegram')?.value.trim() : null;
    const ip = await getUserIP();
    
    if (!username || !password) { document.getElementById('authError').innerText = 'Заполни все поля!'; return; }
    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      const adminData = await db.ref(`users/${ADMIN_USERNAME}`).once('value');
      if (!adminData.exists()) await db.ref(`users/${ADMIN_USERNAME}`).set({ password: ADMIN_PASSWORD, role: 'admin', hasPaid: true, hasCreatedMod: false, userModId: null, registered: Date.now(), isBanned: false, telegram: YOUR_TELEGRAM, ip: ip });
      currentUser = ADMIN_USERNAME; localStorage.setItem('modhub_current_user', ADMIN_USERNAME);
      await loadUsers(); await loadMods(); await loadUserDownloads(); await loadBannedIPs(); updateUIAfterLogin(); return;
    }
    if (isLoginMode) {
      const result = await login(username, password, ip);
      if (result.success) { await loadMods(); updateUIAfterLogin(); } else document.getElementById('authError').innerText = result.error;
    } else {
      if (!telegram) { document.getElementById('authError').innerText = 'Введите Telegram!'; return; }
      const result = await register(username, password, telegram, ip);
      if (result.success) { await login(username, password, ip); await loadMods(); updateUIAfterLogin(); } else document.getElementById('authError').innerText = result.error;
    }
  }
  
  function updateUIAfterLogin() {
    const userInfo = document.getElementById('userInfo');
    const adminTab = document.getElementById('adminTabBtn');
    const supportTab = document.getElementById('supportTabBtn');
    const roleBadge = document.getElementById('roleBadge');
    const roleInfo = getUserRoleDisplay(currentUser);
    
    if (isAdmin()) {
      userInfo.innerHTML = `<span class="admin-name">👑 ${currentUser}</span> <button class="logout-btn" onclick="logout()">Выйти</button>`;
      adminTab.style.display = 'block';
      supportTab.style.display = 'block';
      roleBadge.innerHTML = '👑 АДМИНИСТРАТОР 👑';
      roleBadge.classList.add('admin-badge');
    } else if (isModerator()) {
      userInfo.innerHTML = `<span class="moderator-name">🔧 ${currentUser}</span> <button class="logout-btn" onclick="logout()">Выйти</button>`;
      adminTab.style.display = 'none';
      supportTab.style.display = 'block';
      roleBadge.innerHTML = '🔧 МОДЕРАТОР 🔧';
      roleBadge.classList.add('moderator-badge');
    } else {
      userInfo.innerHTML = `👤 ${currentUser} <button class="logout-btn" onclick="logout()">Выйти</button>`;
      adminTab.style.display = 'none';
      supportTab.style.display = 'block';
      roleBadge.innerHTML = '💰 Монетизация для авторов';
      roleBadge.classList.remove('admin-badge', 'moderator-badge');
    }
    renderMods();
    openTab('mods');
  }
  
  function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
    if (tabName === 'profile' && currentUser) viewProfile(currentUser);
    if (tabName === 'myMod' && currentUser) showMyModScreen();
    if (tabName === 'mods') renderMods();
    if (tabName === 'support' && currentUser) renderSupportPanel();
    if (tabName === 'admin' && isAdmin()) showAdminPanel();
  async function init() {
    await loadMods();
    await loadBannedIPs();
    const savedUser = localStorage.getItem('modhub_current_user');
    if (savedUser) {
      await loadUsers();
      if (users[savedUser] && !users[savedUser].isBanned) {
        currentUser = savedUser;
        await loadUserDownloads();
        updateUIAfterLogin();
      } else showAuthScreen();
    } else showAuthScreen();
    checkPaymentStatus();
  }
  
  showCaptcha();
  
  window.openTab = openTab;
  window.handleAuth = handleAuth;
  window.toggleAuthMode = toggleAuthMode;
  window.logout = logout;
  window.createPayment = createPayment;
  window.saveUserMod = saveUserMod;
  window.cancelCreation = cancelCreation;
  window.editMod = editMod;
  window.adminAddMod = adminAddMod;
  window.adminDeleteMod = adminDeleteMod;
  window.adminDeleteUser = adminDeleteUser;
  window.adminForcePay = adminForcePay;
  window.adminViewProfile = adminViewProfile;
  window.viewProfile = viewProfile;
  window.toggleBanUser = toggleBanUser;
  window.downloadMod = downloadMod;
  window.searchMods = searchMods;
  window.clearSearch = clearSearch;
  window.sendUserMessage = sendUserMessage;
  window.sendAdminMessageToUser = sendAdminMessageToUser;
  window.openChat = openChat;
  window.togglePinMod = togglePinMod;
  window.banUserByIP = banUserByIP;
  window.promoteToModerator = promoteToModerator;
</script>
</body>
</html>
